{% set name = "zndraw" %}
{% set version = "0.6.0" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/zndraw-{{ version }}.tar.gz
  sha256: 8dc8b3efe3f33ab3442810c9300dcfe1e2b864923d90fb83548f8133d1c01382

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - argon2-cffi >=25.1.0
    - asebytes >=0.1.7
    - cachetools >=6.2.0
    - dnspython >=2.8.0
    - fsspec >=2025.10.0
    - msgpack-numpy >=0.4.8
    - msgpack-python >=1.1.1
    - prometheus_client >=0.23.1
    - pydantic-settings >=2.8.0
    - pyjwt >=2.10.1
    - pymongo >=4.10.0
    - python-lmdb >=1.7.5
    - rich >=14.1.0
    - python-vesin >=0.3.8
    - znh5md >=0.4.8
    - eventlet >=0.40.3
    - python >={{ python_min }},<4.0.0
    - ase >=3.26.0
    - typer >=0.19.2
    - flask >=3.1.2
    - tqdm >=4.67.1
    - flask-socketio >=5.5.1
    - networkx >=3.5
    - pydantic >=2.11.9
    - python-socketio >=5.13.0
    - plotly >=6.3.1
    - pandas >=2.3.3
    - celery >=5.5.3
    - sqlalchemy >=2.0.38
    - redis-py >=6.4.0
    - splines >=0.3.3
    - znsocket >=0.3.0
    - znjson >=0.2.6
    - requests

test:
  imports:
    - zndraw
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/zincware/ZnDraw
  summary: Display and Edit Molecular Structures and Trajectories in the Browser.
  license: EPL-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
